<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Overwatch Coach - Gemini 3</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: #222; padding: 20px; border-radius: 10px; border: 1px solid #fa9c1e; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        button { background: #fa9c1e; color: white; font-weight: bold; cursor: pointer; }
        #drop-zone { border: 2px dashed #4096ee; padding: 30px; margin: 10px 0; cursor: pointer; }
        #res { text-align: left; background: #000; padding: 15px; margin-top: 20px; display: none; white-space: pre-wrap; border-left: 4px solid #fa9c1e; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#fa9c1e;">OW COACH AI - GEMINI 3</h2>
        <input type="password" id="key" placeholder="Clé API Gemini (Compte validé)">
        <div id="drop-zone">GLISSE TA VOD ICI (.MP4)</div>
        <button id="btn">🚀 LANCER L'ANALYSE</button>
        <p id="wait" style="display:none; color:#4096ee;">⏳ Gemini 3 analyse ton gameplay...</p>
        <div id="res"></div>
    </div>

<script>
    let file = null;
    const dz = document.getElementById('drop-zone');
    dz.ondragover = (e) => e.preventDefault();
    dz.ondrop = (e) => {
        e.preventDefault();
        file = e.dataTransfer.files[0];
        dz.innerText = "✅ " + file.name;
    };

    document.getElementById('btn').onclick = async () => {
        const key = document.getElementById('key').value.trim();
        if (!key || !file) return alert("Clé ou vidéo manquante !");

        document.getElementById('wait').style.display = 'block';
        document.getElementById('res').style.display = 'none';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            
            // L'URL exacte pour ton accès Gemini 3 Preview
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "Tu es un coach Overwatch Top 500. Analyse ce gameplay et donne 3 conseils." },
                            { inline_data: { mime_type: "video/mp4", data: base64 } }
                        ]}]
                    })
                });

                const data = await response.json();
                document.getElementById('wait').style.display = 'none';

                if (data.error) {
                    document.getElementById('res').innerText = "Erreur : " + data.error.message;
                } else {
                    document.getElementById('res').innerText = data.candidates[0].content.parts[0].text;
                }
                document.getElementById('res').style.display = 'block';
            } catch (e) {
                alert("Erreur réseau : " + e.message);
            }
        };
    };
</script>
</body>
</html>
