<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OW Coach AI - Fix 404</title>
    <style>
        :root { --ow-orange: #fa9c1e; --ow-blue: #4096ee; --bg: #0b0c10; --card: #1a1c23; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; }
        #drop-zone { border: 2px dashed var(--ow-blue); padding: 20px; text-align: center; margin: 15px 0; cursor: pointer; }
        video { width: 100%; display: none; margin-top: 10px; }
        .btn { background: var(--ow-orange); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #ai-response { margin-top: 20px; white-space: pre-wrap; display: none; padding: 15px; background: #111; border-left: 3px solid var(--ow-orange); }
        .loader { display: none; color: var(--ow-blue); text-align: center; margin: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>OW COACH AI</h2>
        <input type="password" id="apiKey" placeholder="Clé API Gemini (AI Studio)">
        
        <div class="grid">
            <select id="hero"><option>Tracer</option><option>Genji</option><option>Ana</option></select>
            <select id="rank"><option>Gold</option><option>Diamond</option><option>Master</option></select>
        </div>

        <div id="drop-zone"><b>GLISSE TA VIDÉO ICI</b><video id="vPlayer" controls></video></div>
        
        <button class="btn" id="runBtn">🚀 ANALYSER</button>
        <div id="loader" class="loader">⏳ Analyse en cours... (Vérification du modèle)</div>
        <div id="ai-response"></div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    let videoBlob = null;
    document.getElementById('drop-zone').ondragover = (e) => e.preventDefault();
    document.getElementById('drop-zone').ondrop = (e) => {
        e.preventDefault();
        videoBlob = e.dataTransfer.files[0];
        const vp = document.getElementById('vPlayer');
        vp.src = URL.createObjectURL(videoBlob);
        vp.style.display = 'block';
    };

    document.getElementById('runBtn').onclick = async () => {
        const key = document.getElementById('apiKey').value;
        if (!key || !videoBlob) return alert("Clé ou vidéo manquante !");

        const loader = document.getElementById('loader');
        const responseBox = document.getElementById('ai-response');
        loader.style.display = 'block';
        responseBox.style.display = 'none';

        try {
            const genAI = new GoogleGenerativeAI(key);
            
            // TEST DE NOM : On utilise le nom complet avec le préfixe "models/"
            // C'est souvent ce qui débloque la 404
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const reader = new FileReader();
            reader.readAsDataURL(videoBlob);
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];

                try {
                    const result = await model.generateContent([
                        { text: "Tu es un coach Overwatch. Analyse ce gameplay." },
                        { inlineData: { mimeType: videoBlob.type, data: base64Data } }
                    ]);

                    const response = await result.response;
                    loader.style.display = 'none';
                    responseBox.style.display = 'block';
                    responseBox.innerText = response.text();
                } catch (innerError) {
                    loader.style.display = 'none';
                    console.error(innerError);
                    alert("Erreur fatale : " + innerError.message);
                }
            };
        } catch (e) {
            loader.style.display = 'none';
            alert("Erreur d'initialisation : " + e.message);
        }
    };
</script>
</body>
</html>
