<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OW Coach AI - Direct Mode</title>
    <style>
        :root { --ow-orange: #fa9c1e; --ow-blue: #4096ee; --bg: #0b0c10; --card: #1a1c23; --text: #f0f0f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .card { max-width: 600px; margin: auto; background: var(--card); padding: 25px; border-radius: 12px; border: 1px solid #333; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; box-sizing: border-box; }
        input { background: #000; color: #fff; }
        .btn { background: var(--ow-orange); color: white; font-weight: bold; cursor: pointer; border: none; }
        #drop-zone { border: 2px dashed var(--ow-blue); padding: 30px; text-align: center; margin: 15px 0; border-radius: 10px; cursor: pointer; }
        #ai-response { margin-top: 20px; padding: 15px; background: #111; border-left: 4px solid var(--ow-orange); display: none; white-space: pre-wrap; line-height: 1.6; }
        .loader { text-align: center; color: var(--ow-blue); display: none; margin: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color:var(--ow-orange); text-align:center;">OW COACH AI (FIX 2026)</h2>
    <input type="password" id="apiKey" placeholder="Colle ta clé API Gemini ici">
    
    <div id="drop-zone"><b>GLISSE TA VOD MP4 ICI</b></div>
    
    <button class="btn" id="runBtn">🚀 ANALYSER LE GAMEPLAY</button>
    <div id="loader" class="loader">⏳ ANALYSE EN COURS (Envoi direct)...</div>
    <div id="ai-response"></div>
</div>

<script>
    let videoBlob = null;
    const dz = document.getElementById('drop-zone');

    dz.ondragover = (e) => e.preventDefault();
    dz.ondrop = (e) => {
        e.preventDefault();
        videoBlob = e.dataTransfer.files[0];
        dz.innerHTML = "✅ Vidéo prête : " + videoBlob.name;
    };

    document.getElementById('runBtn').onclick = async () => {
        const key = document.getElementById('apiKey').value.trim();
        if (!key || !videoBlob) return alert("Clé ou vidéo manquante !");

        const loader = document.getElementById('loader');
        const responseBox = document.getElementById('ai-response');
        loader.style.display = 'block';
        responseBox.style.display = 'none';

        try {
            const reader = new FileReader();
            reader.readAsDataURL(videoBlob);
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];

                // URL DIRECTE DE L'API (On force la version stable v1beta)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "Tu es un coach Overwatch Top 500. Analyse cette VOD et donne des conseils tactiques en français." },
                            { inline_data: { mime_type: "video/mp4", data: base64Data } }
                        ]
                    }]
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                const aiText = data.candidates[0].content.parts[0].text;
                loader.style.display = 'none';
                responseBox.style.display = 'block';
                responseBox.innerText = aiText;
            };
        } catch (error) {
            loader.style.display = 'none';
            console.error(error);
            alert("ERREUR : " + error.message);
        }
    };
</script>
</body>
</html>
