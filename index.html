<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OW VOD Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10; --bg2: #0f1218; --bg3: #161b24; --border: #1e2530; --border2: #2a3342;
      --accent: #f5a623; --blue: #4a9eff; --green: #3ecf8e; --red: #ff4d6d; --purple: #a78bfa;
      --text: #e8edf5; --text2: #8b95a8; --font-display: 'Rajdhani', sans-serif; --font-body: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.6; }
    .app-container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 40px; }
    h1 { font-family: var(--font-display); font-size: 2.5rem; text-transform: uppercase; color: var(--accent); }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 25px; margin-bottom: 25px; }
    .grid-setup { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    label { display: block; font-family: var(--font-display); font-size: 0.9rem; color: var(--text2); margin-bottom: 5px; }
    input, select { width: 100%; background: var(--bg3); border: 1px solid var(--border2); padding: 10px; color: #fff; border-radius: 6px; }
    .upload-box { border: 2px dashed var(--border2); border-radius: 10px; padding: 30px; text-align: center; cursor: pointer; position: relative; }
    .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .btn-primary { display: block; width: 100%; background: var(--accent); color: #000; font-family: var(--font-display); font-weight: 700; text-transform: uppercase; padding: 15px; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    .btn-primary:disabled { opacity: 0.4; }
    #progressSection { display: none; text-align: center; }
    .loader { width: 40px; height: 40px; border: 3px solid #FFF; border-bottom-color: var(--accent); border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #resultsSection { display: none; }
    .summary-card { background: var(--bg3); border-left: 4px solid var(--accent); padding: 20px; border-radius: 8px; margin-bottom: 30px; }
    .ts-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; }
    .ts-head { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; gap: 15px; }
    .ts-time { font-family: var(--font-display); font-weight: 700; color: var(--accent); background: rgba(245, 166, 35, 0.1); padding: 2px 8px; border-radius: 4px; }
    .ts-category { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; }
    .cat-death { background: rgba(255, 77, 109, 0.2); color: var(--red); }
    .cat-mistake { background: rgba(245, 166, 35, 0.2); color: var(--accent); }
    .cat-good { background: rgba(62, 207, 142, 0.2); color: var(--green); }
    .ts-body { display: none; padding: 15px 15px 15px 60px; color: var(--text2); border-top: 1px solid var(--border); font-size: 0.9rem; }
    .priority-item { background: var(--bg3); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border2); }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>OW <span style="color:#fff">VOD</span> ANALYZER</h1>
      <p style="color:var(--text2)">Coach Neural Top 500</p>
    </header>

    <div id="setupSection" class="card">
      <div class="grid-setup">
        <div>
          <label>Clé API Gemini</label>
          <input type="password" id="apiKey" placeholder="Votre clé...">
        </div>
        <div>
          <label>Héros</label>
          <select id="heroSelect"><option>Chargement...</option></select>
        </div>
        <div>
          <label>Rang</label>
          <select id="rankSelect">
            <option>Bronze</option><option>Argent</option><option>Or</option><option>Platine</option>
            <option>Diamant</option><option>Master</option><option>Grand Master</option>
          </select>
        </div>
      </div>
      <div class="upload-box">
        <input type="file" id="videoFile" accept="video/*">
        <p id="fileStatus">Cliquez pour ajouter votre VOD (MP4)</p>
      </div>
      <button id="analyzeBtn" class="btn-primary" disabled>Lancer l'Analyse</button>
    </div>

    <div id="progressSection" class="card">
      <span class="loader"></span>
      <p id="statusMsg" style="margin-top:15px; color:var(--accent); font-family:var(--font-display)">Analyse des pixels en cours...</p>
    </div>

    <div id="resultsSection">
      <div class="summary-card"><p id="summaryText"></p></div>
      <div id="timestampList"></div>
      <div id="priorityList" style="margin-top:20px;"></div>
      <button onclick="location.reload()" class="btn-primary" style="background:none; border:1px solid var(--border2); color:var(--text2)">Nouvelle VOD</button>
    </div>
  </div>

  <script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const CATEGORIES = {
      death: { label: "Mort", cssClass: "cat-death" },
      mistake: { label: "Erreur", cssClass: "cat-mistake" },
      good: { label: "Top", cssClass: "cat-good" },
      positioning: { label: "Position", cssClass: "cat-mistake" },
      ulti: { label: "Ultime", cssClass: "cat-good" }
    };

    let selectedFile = null;

    async function init() {
      try {
        const res = await fetch('/heroes');
        const data = await res.json();
        document.getElementById('heroSelect').innerHTML = data.map(h => `<option value="${h}">${h}</option>`).join('');
      } catch (e) { console.error("Erreur heroes:", e); }
    }
    init();

    document.getElementById('videoFile').onchange = (e) => {
      selectedFile = e.target.files[0];
      if(selectedFile) {
        document.getElementById('fileStatus').textContent = "Fichier prêt : " + selectedFile.name;
        document.getElementById('fileStatus').style.color = "var(--green)";
      }
      checkReady();
    };

    document.getElementById('apiKey').oninput = checkReady;

    function checkReady() {
      const key = document.getElementById('apiKey').value;
      document.getElementById('analyzeBtn').disabled = !(key && selectedFile);
    }

    // PROMPT EQUILIBRÉ : Précis mais évite les inventions
    function buildPrompt(hero, rank) {
      return `Tu es ARCHITECTE OW, un coach professionnel. Analyse cette VOD de ${hero} (${rank}).
      
      CONSIGNES DE SÉCURITÉ :
      1. Ne parle QUE de ce que tu vois. Si un héros n'est pas dans le match, ne le mentionne pas.
      2. Vérifie le HUD (cooldowns en bas à droite) avant de critiquer une action.
      3. Limite-toi à 5 ou 6 moments clés VRAIMENT importants.
      
      FORMAT JSON STRICT :
      {
        "summary": "Résumé de la performance.",
        "timestamps": [{"time":"MM:SS", "category":"death|mistake|good", "title":"Titre", "description":"Analyse factuelle"}],
        "priorities": ["Action 1", "Action 2", "Action 3"]
      }`;
    }

    document.getElementById('analyzeBtn').onclick = async () => {
      const key = document.getElementById('apiKey').value;
      const hero = document.getElementById('heroSelect').value;
      const rank = document.getElementById('rankSelect').value;

      document.getElementById('setupSection').style.display = 'none';
      document.getElementById('progressSection').style.display = 'block';

      try {
        const genAI = new GoogleGenerativeAI(key);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const reader = new FileReader();
        reader.readAsDataURL(selectedFile);
        reader.onload = async () => {
          const base64Data = reader.result.split(',')[1];
          const result = await model.generateContent([
            { inlineData: { data: base64Data, mimeType: selectedFile.type } },
            { text: buildPrompt(hero, rank) }
          ]);

          const rawText = result.response.text();
          const cleanJson = rawText.replace(/```json|```/g, "").trim();
          const data = JSON.parse(cleanJson);

          document.getElementById('summaryText').textContent = data.summary;
          document.getElementById('timestampList').innerHTML = data.timestamps.map((ts, i) => `
            <div class="ts-item">
              <div class="ts-head" onclick="const b=document.getElementById('b-${i}'); b.style.display=b.style.display==='block'?'none':'block'">
                <div class="ts-time">${ts.time}</div>
                <div class="ts-category ${(CATEGORIES[ts.category] || CATEGORIES.mistake).cssClass}">${(CATEGORIES[ts.category] || CATEGORIES.mistake).label}</div>
                <div class="ts-title">${ts.title}</div>
              </div>
              <div class="ts-body" id="b-${i}">${ts.description}</div>
            </div>`).join('');
          
          document.getElementById('priorityList').innerHTML = data.priorities.map(p => `<div class="priority-item">${p}</div>`).join('');
          
          document.getElementById('progressSection').style.display = 'none';
          document.getElementById('resultsSection').style.display = 'block';
        };
      } catch (err) {
        alert("Erreur d'analyse. Vérifiez votre clé API ou le format du fichier.");
        location.reload();
      }
    };
  </script>
</body>
</html>
