<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OW Coach - Diagnostic Mode</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: #2a2a2a; padding: 25px; border-radius: 12px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #fa9c1e; color: white; font-weight: bold; cursor: pointer; }
        #log { text-align: left; background: #000; padding: 15px; font-size: 0.8em; color: #0f0; margin-top: 20px; border-radius: 5px; height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="box">
        <h2>DIAGNOSTIC GEMINI</h2>
        <input type="password" id="apiKey" placeholder="Colle ta clé API ici">
        <button id="diagBtn">🔍 TESTER LA CONNEXION</button>
        <div id="log">En attente de test...</div>
    </div>

<script>
    const logger = document.getElementById('log');
    function log(msg) { logger.innerHTML += "> " + msg + "<br>"; }

    document.getElementById('diagBtn').onclick = async () => {
        const key = document.getElementById('apiKey').value.trim();
        if (!key) return alert("Mets ta clé !");
        
        logger.innerHTML = "";
        log("Démarrage du diagnostic...");

        // Liste des modèles à tester
        const models = ["gemini-1.5-flash", "gemini-1.5-flash-latest", "gemini-1.5-pro"];

        for (let m of models) {
            log(`Test du modèle : ${m}...`);
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${key}`;
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Coucou" }] }] })
                });
                const data = await resp.json();

                if (data.error) {
                    log(`❌ Échec (${m}): ${data.error.message}`);
                } else {
                    log(`✅ SUCCÈS avec ${m} !`);
                    alert(`Ça marche avec ${m} ! Utilise ce nom dans ton code.`);
                    return;
                }
            } catch (e) {
                log(`❌ Erreur réseau pour ${m}`);
            }
        }
        log("--- DIAGNOSTIC TERMINÉ ---");
        log("Si tout est en rouge, ton compte Google bloque l'accès.");
    };
</script>
</body>
</html>
