<script>
    let videoBlob = null;
    const dz = document.getElementById('drop-zone');

    dz.ondragover = (e) => e.preventDefault();
    dz.ondrop = (e) => {
        e.preventDefault();
        videoBlob = e.dataTransfer.files[0];
        dz.innerHTML = "✅ Vidéo prête : " + videoBlob.name;
    };

    document.getElementById('runBtn').onclick = async () => {
        const key = document.getElementById('apiKey').value.trim();
        if (!key || !videoBlob) return alert("Manque la clé ou la vidéo !");

        const loading = document.getElementById('loading');
        const responseBox = document.getElementById('response');
        loading.style.display = 'block';
        responseBox.style.display = 'none';

        try {
            const reader = new FileReader();
            reader.readAsDataURL(videoBlob);
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];

                // --- CHANGEMENT ICI : ON UTILISE GEMINI-1.5-FLASH-8B (plus facile d'accès) ---
                // Parfois le modèle 8B est débloqué avant le Flash standard
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${key}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "Analyse ce gameplay Overwatch et donne des conseils." },
                            { inline_data: { mime_type: "video/mp4", data: base64Data } }
                        ]
                    }],
                    // On ajoute une config de sécurité pour forcer le passage
                    safetySettings: [
                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }
                    ]
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                loading.style.display = 'none';

                if (data.error) {
                    // Si le 8B ne marche pas, on tente une dernière fois le Pro automatiquement
                    if (data.error.code === 404) {
                        alert("Le modèle 8B est aussi introuvable. Ton compte n'a pas encore accès à l'API. Réessaie demain ou utilise un autre compte Gmail.");
                    } else {
                        responseBox.innerText = "Erreur : " + data.error.message;
                    }
                } else {
                    responseBox.innerText = data.candidates[0].content.parts[0].text;
                }
                responseBox.style.display = 'block';
            };
        } catch (err) {
            loading.style.display = 'none';
            alert("Erreur réseau : " + err.message);
        }
    };
</script>
