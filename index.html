<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OW Coach AI - Gemini 3 Final</title>
    <style>
        body { font-family: sans-serif; background: #111; color: white; text-align: center; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: #222; padding: 25px; border-radius: 12px; border: 2px solid #fa9c1e; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        button { background: #fa9c1e; color: white; font-weight: bold; cursor: pointer; }
        #drop-zone { border: 2px dashed #4096ee; padding: 30px; margin: 15px 0; cursor: pointer; background: rgba(0,0,0,0.3); }
        #res { text-align: left; background: #000; padding: 15px; margin-top: 20px; display: none; white-space: pre-wrap; border-left: 4px solid #fa9c1e; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#fa9c1e;">OW COACH AI - V3</h2>
        <input type="password" id="key" placeholder="Colle ta clé API Gemini 3 ici">
        <div id="drop-zone">GLISSE TA VOD ICI (.MP4)</div>
        <button id="btn">🚀 LANCER L'ANALYSE</button>
        <p id="wait" style="display:none; color:#4096ee;">⏳ Analyse en cours par Gemini 3...</p>
        <div id="res"></div>
    </div>

<script>
    let file = null;
    const dz = document.getElementById('drop-zone');
    dz.ondragover = (e) => e.preventDefault();
    dz.ondrop = (e) => {
        e.preventDefault();
        file = e.dataTransfer.files[0];
        dz.innerText = "✅ " + file.name;
    };

    document.getElementById('btn').onclick = async () => {
        const key = document.getElementById('key').value.trim();
        if (!key || !file) return alert("Clé ou vidéo manquante !");

        document.getElementById('wait').style.display = 'block';
        document.getElementById('res').style.display = 'none';

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            
            // On utilise v1beta pour le modèle Preview
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: "Tu es un coach Overwatch Top 500. Analyse ce gameplay et donne 3 conseils tactiques en français." },
                        { 
                            inlineData: { // Correction : 'inlineData' (CamelCase) et pas 'inline_data'
                                mimeType: "video/mp4", // Correction : 'mimeType' et pas 'mime_type'
                                data: base64 
                            } 
                        }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                document.getElementById('wait').style.display = 'none';

                if (data.error) {
                    document.getElementById('res').innerText = "Erreur : " + data.error.message;
                } else if (data.candidates && data.candidates[0].content) {
                    document.getElementById('res').innerText = data.candidates[0].content.parts[0].text;
                } else {
                    document.getElementById('res').innerText = "Gemini 3 n'a pas pu répondre. Vérifie la durée du clip.";
                }
                document.getElementById('res').style.display = 'block';
            } catch (e) {
                document.getElementById('wait').style.display = 'none';
                alert("Erreur réseau : " + e.message);
            }
        };
    };
</script>
</body>
</html>
