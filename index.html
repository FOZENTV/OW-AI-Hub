<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OW VOD Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0c10; --bg2: #0f1218; --bg3: #161b24; --border: #1e2530; --border2: #2a3342;
      --accent: #f5a623; --blue: #4a9eff; --green: #3ecf8e; --red: #ff4d6d; --purple: #a78bfa;
      --text: #e8edf5; --text2: #8b95a8; --text3: #4a5568;
      --font-display: 'Rajdhani', sans-serif; --font-body: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); color: var(--text); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; }
    .app-container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 50px; }
    h1 { font-family: var(--font-display); font-size: 3rem; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(to right, #fff, var(--text2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
    .subtitle { color: var(--text2); font-size: 1.1rem; font-weight: 300; }
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .grid-setup { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 25px; margin-bottom: 25px; }
    label { display: block; font-family: var(--font-display); text-transform: uppercase; font-size: 0.9rem; color: var(--text2); margin-bottom: 8px; letter-spacing: 1px; }
    input, select { width: 100%; background: var(--bg3); border: 1px solid var(--border2); padding: 12px 15px; color: #fff; border-radius: 6px; font-family: inherit; transition: all 0.2s; }
    .upload-box { border: 2px dashed var(--border2); border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; }
    .upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .file-name { margin-top: 15px; color: var(--accent); font-weight: 600; font-family: var(--font-display); }
    .btn-primary { display: block; width: 100%; background: var(--accent); color: #000; font-family: var(--font-display); font-weight: 700; text-transform: uppercase; font-size: 1.1rem; padding: 16px; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s, background 0.2s; margin-top: 20px; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    #progressSection { display: none; text-align: center; padding: 40px; }
    .loader { width: 48px; height: 48px; border: 3px solid #FFF; border-bottom-color: var(--accent); border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-bottom: 20px; }
    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    #resultsSection { display: none; }
    .summary-card { background: linear-gradient(135deg, var(--bg2), var(--bg3)); border-left: 4px solid var(--accent); padding: 25px; border-radius: 8px; margin-bottom: 40px; }
    .summary-card h2 { font-family: var(--font-display); text-transform: uppercase; margin-bottom: 15px; color: var(--accent); }
    .ts-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; overflow: hidden; }
    .ts-head { display: flex; align-items: center; padding: 15px 20px; cursor: pointer; gap: 15px; }
    .ts-head:hover { background: var(--bg3); }
    .ts-time { font-family: var(--font-display); font-weight: 700; color: var(--accent); background: rgba(245, 166, 35, 0.1); padding: 4px 10px; border-radius: 4px; min-width: 65px; text-align: center; }
    .ts-category { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
    .cat-death { background: rgba(255, 77, 109, 0.15); color: var(--red); }
    .cat-mistake { background: rgba(245, 166, 35, 0.15); color: var(--accent); }
    .cat-good { background: rgba(62, 207, 142, 0.15); color: var(--green); }
    .ts-title { flex: 1; font-weight: 600; }
    .ts-body { display: none; padding: 0 20px 20px 80px; color: var(--text2); border-top: 1px solid var(--border); padding-top: 15px; }
    .priority-item { background: var(--bg3); padding: 20px; border-radius: 8px; border: 1px solid var(--border2); margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>OW VOD <span style="color: var(--accent)">Neural</span> Analyzer</h1>
      <p class="subtitle">Analyse pro Overwatch 2</p>
    </header>

    <div id="setupSection" class="card">
      <div class="grid-setup">
        <div>
          <label>API Key Gemini</label>
          <input type="password" id="apiKey" placeholder="Votre clé API...">
        </div>
        <div>
          <label>Héros Joué</label>
          <select id="heroSelect"><option value="">Chargement...</option></select>
        </div>
        <div>
          <label>Votre Rang</label>
          <select id="rankSelect">
            <option>Bronze</option><option>Argent</option><option>Or</option><option>Platine</option>
            <option>Diamant</option><option>Master</option><option>Grand Master</option>
          </select>
        </div>
      </div>
      <div class="upload-box">
        <input type="file" id="videoFile" accept="video/*">
        <p>Cliquez ou glissez votre VOD ici</p>
        <div id="fileName" class="file-name"></div>
      </div>
      <button id="analyzeBtn" class="btn-primary" disabled>Lancer l'analyse</button>
    </div>

    <div id="progressSection" class="card">
      <span class="loader"></span>
      <div id="loadingStatus" style="color: var(--accent); font-family: var(--font-display); text-transform: uppercase;">Traitement vidéo...</div>
    </div>

    <div id="resultsSection">
      <div class="summary-card"><h2>Analyse</h2><div id="summaryText"></div></div>
      <div id="timestampList"></div>
      <div id="priorityList" style="margin-top:30px;"></div>
      <button onclick="location.reload()" class="btn-primary" style="background:transparent; color:var(--text2); border:1px solid var(--border2);">Nouvelle VOD</button>
    </div>
  </div>

  <script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const CATEGORIES = {
      death: { label: "Mort", cssClass: "cat-death" },
      mistake: { label: "Erreur", cssClass: "cat-mistake" },
      good: { label: "Top", cssClass: "cat-good" },
      positioning: { label: "Placement", cssClass: "cat-mistake" },
      ulti: { label: "Ultime", cssClass: "cat-good" }
    };

    let selectedFile = null;

    async function init() {
      try {
        const res = await fetch('/heroes');
        const heroes = await res.json();
        document.getElementById('heroSelect').innerHTML = heroes.map(h => `<option value="${h}">${h}</option>`).join('');
      } catch (e) { console.error(e); }
    }
    init();

    document.getElementById('videoFile').onchange = (e) => {
      selectedFile = e.target.files[0];
      document.getElementById('fileName').textContent = selectedFile ? selectedFile.name : '';
      checkReady();
    };

    document.getElementById('apiKey').oninput = checkReady;
    document.getElementById('analyzeBtn').onclick = generateAnalysis;

    function checkReady() {
      const key = document.getElementById('apiKey').value;
      document.getElementById('analyzeBtn').disabled = !(key && selectedFile);
    }

    function buildPrompt(hero, rank) {
      return `Tu es ARCHITECTE OW, un coach professionnel. Analyse cette VOD de ${hero} (${rank}).
      
      CONSIGNES STRICTES :
      1. ANALYSE VISUELLE : Ne mentionne JAMAIS de héros non présents dans le match. Vérifie les noms dans le Kill Feed.
      2. HUD : Regarde les cooldowns en bas à droite avant de dire qu'un sort a été gâché.
      3. QUALITÉ > QUANTITÉ : Donne maximum 5 ou 6 moments clés VRAIMENT réels.
      
      RÉPONDS UNIQUEMENT EN JSON :
      {
        "summary": "Résumé de la performance globale.",
        "timestamps": [{"time":"MM:SS", "category":"death|mistake|good", "title":"Titre", "description":"Analyse factuelle"}],
        "priorities": ["Conseil 1", "Conseil 2", "Conseil 3"]
      }`;
    }

    async function generateAnalysis() {
      const key = document.getElementById('apiKey').value;
      const hero = document.getElementById('heroSelect').value;
      const rank = document.getElementById('rankSelect').value;

      document.getElementById('setupSection').style.display = 'none';
      document.getElementById('progressSection').style.display = 'block';

      try {
        const genAI = new GoogleGenerativeAI(key);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const reader = new FileReader();
        reader.readAsDataURL(selectedFile);
        reader.onload = async () => {
          const base64Data = reader.result.split(',')[1];
          const result = await model.generateContent([
            { inlineData: { data: base64Data, mimeType: selectedFile.type } },
            { text: buildPrompt(hero, rank) }
          ]);

          const data = JSON.parse(result.response.text().replace(/```json|```/g, "").trim());
          
          document.getElementById('summaryText').textContent = data.summary;
          document.getElementById('timestampList').innerHTML = data.timestamps.map((ts, i) => `
            <div class="ts-item">
              <div class="ts-head" onclick="const b=document.getElementById('b-${i}'); b.style.display=b.style.display==='block'?'none':'block'">
                <div class="ts-time">${ts.time}</div>
                <div class="ts-category ${(CATEGORIES[ts.category] || CATEGORIES.mistake).cssClass}">${(CATEGORIES[ts.category] || CATEGORIES.mistake).label}</div>
                <div class="ts-title">${ts.title}</div>
              </div>
              <div class="ts-body" id="b-${i}" style="display:none">${ts.description}</div>
            </div>`).join('');
          
          document.getElementById('priorityList').innerHTML = data.priorities.map(p => `<div class="priority-item">${p}</div>`).join('');
          
          document.getElementById('progressSection').style.display = 'none';
          document.getElementById('resultsSection').style.display = 'block';
        };
      } catch (err) {
        alert("Erreur. Vérifiez la clé API.");
        location.reload();
      }
    }
  </script>
</body>
</html>
