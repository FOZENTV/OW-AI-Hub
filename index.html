<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Overwatch Coach AI - Fix Final</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .box { max-width: 500px; margin: auto; background: #2a2a2a; padding: 25px; border-radius: 12px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        input { background: #000; color: white; border: 1px solid #444; }
        button { background: #fa9c1e; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:hover { background: #ff7b00; }
        #drop-zone { border: 2px dashed #4096ee; padding: 40px; margin: 15px 0; border-radius: 10px; cursor: pointer; background: rgba(64, 150, 238, 0.05); }
        #response { text-align: left; background: #111; padding: 15px; margin-top: 20px; border-radius: 5px; display: none; white-space: pre-wrap; border-left: 4px solid #fa9c1e; }
        #loading { display: none; color: #4096ee; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>

    <div class="box">
        <h2 style="color:#fa9c1e; margin-top:0;">OW COACH AI</h2>
        <p style="font-size: 0.8em; color: #888;">Si ça met 404, ton compte Google n'est pas encore prêt.</p>
        
        <input type="password" id="apiKey" placeholder="Colle ta clé API Gemini">
        
        <div id="drop-zone"><b>GLISSE TA VOD MP4 ICI</b></div>
        
        <button id="runBtn">🚀 ANALYSER LE GAMEPLAY</button>
        <div id="loading">⏳ Analyse en cours (Envoi des données)...</div>
        <div id="response"></div>
    </div>

<script>
    let videoBlob = null;
    const dz = document.getElementById('drop-zone');

    // Gestion du fichier
    dz.ondragover = (e) => e.preventDefault();
    dz.ondrop = (e) => {
        e.preventDefault();
        videoBlob = e.dataTransfer.files[0];
        dz.innerHTML = "✅ Vidéo prête : " + videoBlob.name;
        dz.style.borderColor = "#fa9c1e";
    };

    document.getElementById('runBtn').onclick = async () => {
        const key = document.getElementById('apiKey').value.trim();
        if (!key || !videoBlob) return alert("Manque la clé ou la vidéo !");

        const loading = document.getElementById('loading');
        const responseBox = document.getElementById('response');
        
        loading.style.display = 'block';
        responseBox.style.display = 'none';

        try {
            const reader = new FileReader();
            reader.readAsDataURL(videoBlob);
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];

                // On utilise le modèle "flash-8b" qui est souvent activé plus vite que le "flash" normal
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-8b:generateContent?key=${key}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "Tu es un coach Overwatch Top 500. Analyse ce gameplay en français." },
                            { inline_data: { mime_type: "video/mp4", data: base64Data } }
                        ]
                    }]
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                loading.style.display = 'none';

                if (data.error) {
                    responseBox.innerHTML = `<b style="color:red;">Erreur ${data.error.code} :</b> ${data.error.message}`;
                } else {
                    responseBox.innerText = data.candidates[0].content.parts[0].text;
                }
                responseBox.style.display = 'block';
            };
        } catch (err) {
            loading.style.display = 'none';
            alert("Erreur réseau : " + err.message);
        }
    };
</script>
</body>
</html>
