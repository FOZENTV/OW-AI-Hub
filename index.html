<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OW VOD Analyzer</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0a0c10;
      --bg2:     #0f1218;
      --bg3:     #161b24;
      --border:  #1e2530;
      --border2: #2a3342;
      --accent:  #f5a623;
      --blue:    #4a9eff;
      --green:   #3ecf8e;
      --red:     #ff4d6d;
      --purple:  #a78bfa;
      --text:    #e8edf5;
      --text2:   #8b95a8;
      --text3:   #4a5568;
      --display: 'Rajdhani', sans-serif;
      --body:    'Inter', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--body); min-height: 100vh; }
    body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px); pointer-events:none; z-index:999; }

    /* Header */
    .header { padding:20px 32px; border-bottom:1px solid var(--border); background:var(--bg2); display:flex; align-items:center; gap:14px; }
    .logo { font-family:var(--display); font-size:20px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
    .logo span { color:var(--text3); font-weight:500; }
    .badge { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; padding:3px 8px; border:1px solid var(--border2); border-radius:3px; color:var(--text3); }

    /* Layout */
    .main { padding:28px 32px; max-width:900px; margin:0 auto; }

    /* Form */
    input[type="password"], select {
      background:var(--bg3); border:1px solid var(--border2); border-radius:5px;
      padding:7px 12px; font-size:13px; color:var(--text); outline:none;
      font-family:var(--body); transition:border-color .2s;
    }
    input[type="password"]:focus, select:focus { border-color:var(--accent); }
    input[type="password"]::placeholder { color:var(--text3); }
    select option, select optgroup { background:var(--bg3); }
    input[type="file"] { display:none; }

    /* API row */
    .api-row { display:flex; align-items:center; gap:10px; margin-bottom:20px; background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:14px 18px; }
    .api-row label { font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--text2); white-space:nowrap; }
    .api-row a { color:var(--blue); font-size:12px; text-decoration:none; }
    .api-row a:hover { text-decoration:underline; }

    /* Upload zone */
    .upload-zone { border:1.5px dashed var(--border2); border-radius:10px; padding:40px 24px; text-align:center; cursor:pointer; transition:border-color .2s, background .2s; background:var(--bg2); margin-bottom:20px; }
    .upload-zone:hover, .upload-zone.drag { border-color:var(--accent); background:rgba(245,166,35,.04); }
    .upload-zone.has-file { border-style:solid; border-color:var(--green); background:rgba(62,207,142,.04); }
    .upload-icon { font-size:36px; margin-bottom:10px; opacity:.35; }
    .upload-title { font-family:var(--display); font-size:17px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; margin-bottom:5px; }
    .upload-sub { font-size:12px; color:var(--text2); }
    .upload-info { font-size:13px; color:var(--green); margin-top:10px; font-weight:500; }

    /* Config row */
    .config-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:20px; }
    .config-block { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:14px 18px; }
    .config-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:7px; }

    /* Error */
    .error-box { background:rgba(255,77,109,.08); border:1px solid rgba(255,77,109,.25); border-radius:7px; padding:12px 16px; font-size:13px; color:var(--red); display:none; margin-bottom:14px; }
    .error-box.visible { display:block; }

    /* Button */
    .analyze-btn { width:100%; padding:13px; background:var(--accent); border:none; border-radius:7px; font-family:var(--display); font-size:15px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:#0a0c10; cursor:pointer; transition:background .2s, transform .2s; margin-bottom:24px; }
    .analyze-btn:hover:not(:disabled) { background:#e8962a; transform:translateY(-1px); }
    .analyze-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; }

    /* Progress */
    .progress-wrap { display:none; margin-bottom:24px; }
    .progress-wrap.visible { display:block; }
    .progress-track { height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:8px; }
    .progress-bar { height:100%; background:linear-gradient(90deg,var(--accent),var(--blue)); width:0%; transition:width .5s; border-radius:2px; }
    .progress-status { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:8px; }
    .blink-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* Results */
    .results { display:none; }
    .results.visible { display:block; }
    .results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
    .results-title { font-family:var(--display); font-size:19px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; }
    .reset-btn { padding:6px 14px; background:none; border:1px solid var(--border2); border-radius:5px; font-size:12px; color:var(--text2); cursor:pointer; font-family:var(--body); transition:border-color .2s, color .2s; }
    .reset-btn:hover { border-color:var(--text2); color:var(--text); }

    /* Summary */
    .summary-card { background:var(--bg2); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:0 8px 8px 0; padding:16px 20px; margin-bottom:20px; }
    .summary-card h3 { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; }
    .summary-text { font-size:13px; line-height:1.75; color:var(--text2); }
    .section-label { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text3); margin-bottom:10px; }

    /* Timestamps */
    .ts-item { background:var(--bg2); border:1px solid var(--border); border-radius:8px; margin-bottom:10px; overflow:hidden; }
    .ts-head { display:flex; align-items:center; gap:12px; padding:12px 16px; cursor:pointer; }
    .ts-head:hover { background:rgba(255,255,255,.02); }
    .ts-time { font-family:var(--display); font-size:17px; font-weight:700; color:var(--accent); min-width:48px; letter-spacing:.04em; }
    .ts-cat { font-size:10px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; padding:2px 8px; border-radius:3px; }
    .cat-death       { background:rgba(255,77,109,.12);  color:var(--red);    border:1px solid rgba(255,77,109,.25); }
    .cat-mistake     { background:rgba(245,166,35,.10);  color:var(--accent); border:1px solid rgba(245,166,35,.20); }
    .cat-good        { background:rgba(62,207,142,.10);  color:var(--green);  border:1px solid rgba(62,207,142,.20); }
    .cat-positioning { background:rgba(74,158,255,.10);  color:var(--blue);   border:1px solid rgba(74,158,255,.20); }
    .cat-ulti        { background:rgba(167,139,250,.10); color:var(--purple); border:1px solid rgba(167,139,250,.20); }
    .ts-title { font-size:13px; font-weight:500; flex:1; color:var(--text); }
    .ts-chev { font-size:12px; color:var(--text3); }
    .ts-body { padding:12px 16px; font-size:13px; line-height:1.7; color:var(--text2); border-top:1px solid var(--border); display:none; }
    .ts-body.open { display:block; }

    /* Priorities */
    .priorities-card { background:var(--bg2); border:1px solid var(--border); border-left:3px solid var(--blue); border-radius:0 8px 8px 0; padding:16px 20px; margin-top:20px; }
    .priorities-card h3 { font-size:10px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--blue); margin-bottom:12px; }
    .priority-item { display:flex; gap:10px; margin-bottom:9px; }
    .priority-num { font-family:var(--display); font-size:15px; font-weight:700; color:var(--text3); min-width:18px; }
    .priority-text { font-size:13px; line-height:1.65; color:var(--text2); }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">OW <span>/</span> VOD Analyzer</div>
  <div class="badge">Gemini 2.5 Pro</div>
</header>

<main class="main">

  <div class="api-row">
    <label for="apiKey">Clé API Gemini</label>
    <input type="password" id="apiKey" placeholder="AIza..." style="flex:1">
    <a href="https://aistudio.google.com/app/apikey" target="_blank">Obtenir une clé ↗</a>
  </div>

  <input type="file" id="fileInput" accept="video/*">
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">🎬</div>
    <div class="upload-title">Dépose ta VOD ici</div>
    <div class="upload-sub">MP4, MOV — jusqu'à 2 Go</div>
    <div class="upload-info" id="fileInfo"></div>
  </div>

  <div class="config-row">
    <div class="config-block">
      <div class="config-label">Personnage</div>
      <select id="heroSelect" style="width:100%"></select>
    </div>
    <div class="config-block">
      <div class="config-label">Rank</div>
      <select id="rankSelect" style="width:100%"></select>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">⚡ Analyser la VOD</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-status"><div class="blink-dot"></div><span id="progressStatus">Chargement...</span></div>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <div class="results-title">Rapport de coaching</div>
      <button class="reset-btn" onclick="resetForm()">Nouvelle analyse</button>
    </div>
    <div class="summary-card">
      <h3>Résumé global</h3>
      <div class="summary-text" id="summaryText"></div>
    </div>
    <div class="section-label">Moments clés</div>
    <div id="timestampList"></div>
    <div class="priorities-card">
      <h3>Priorités à travailler</h3>
      <div id="priorityList"></div>
    </div>
  </div>

</main>

<script>
  /* ── CONFIG ── */
  const SERVER_URL   = 'https://ow-vod-analyzer.onrender.com';
  const DEFAULT_HERO = 'Tracer';
  const DEFAULT_RANK = 'Diamant';
  const RANKS = ['Bronze','Argent','Or','Platine','Diamant','Maître','Grand Maître','Champion','Top 500'];
  const ROLE_LABELS = { Tank:'🛡️ Tank', Damage:'⚔️ Damage', Support:'💚 Support' };
  const CATEGORIES = {
    death:       { label:'Mort',       cls:'cat-death' },
    mistake:     { label:'Erreur',     cls:'cat-mistake' },
    good:        { label:'Bon moment', cls:'cat-good' },
    positioning: { label:'Position',   cls:'cat-positioning' },
    ulti:        { label:'Ulti',       cls:'cat-ulti' },
  };

  // Fallback si le serveur est endormi
  const HEROES_FALLBACK = {
    Tank:    ['D.Va','Domina','Doomfist','Hazard','Junker Queen','Mauga','Orisa','Ramattra','Reinhardt','Roadhog','Sigma','Winston','Wrecking Ball','Zarya'],
    Damage:  ['Anran','Ashe','Bastion','Cassidy','Echo','Emre','Freja','Genji','Hanzo','Junkrat','Mei','Pharah','Reaper','Sierra','Sojourn','Soldier: 76','Sombra','Symmetra','Torbjörn','Tracer','Vendetta','Venture','Widowmaker'],
    Support: ['Ana','Baptiste','Brigitte','Illari','Jetpack Cat','Juno','Kiriko','Lifeweaver','Lúcio','Mercy','Mizuki','Moira','Wuyang','Zenyatta'],
  };

  /* ── INIT ── */
  function buildHeroSelect(heroes) {
    const sel = document.getElementById('heroSelect');
    sel.innerHTML = '';
    Object.entries(heroes).forEach(([role, list]) => {
      const grp = document.createElement('optgroup');
      grp.label = ROLE_LABELS[role] || role;
      [...list].sort((a,b) => a.localeCompare(b,'fr',{sensitivity:'base'})).forEach(h => {
        const o = document.createElement('option');
        o.value = h; o.textContent = h;
        if (h === DEFAULT_HERO) o.selected = true;
        grp.appendChild(o);
      });
      sel.appendChild(grp);
    });
  }

  function initRanks() {
    const sel = document.getElementById('rankSelect');
    RANKS.forEach(r => {
      const o = document.createElement('option');
      o.value = r; o.textContent = r;
      if (r === DEFAULT_RANK) o.selected = true;
      sel.appendChild(o);
    });
  }

  async function initHeroes() {
    buildHeroSelect(HEROES_FALLBACK); // affichage immédiat
    try {
      const res    = await fetch(SERVER_URL + '/heroes', { signal: AbortSignal.timeout(5000) });
      const heroes = await res.json();
      if (heroes && !Array.isArray(heroes)) buildHeroSelect(heroes);
    } catch { /* fallback déjà affiché */ }
  }

  initRanks();
  initHeroes();

  /* ── UPLOAD ZONE ── */
  let selectedFile = null;
  const zone = document.getElementById('uploadZone');
  const fi   = document.getElementById('fileInput');

  zone.addEventListener('click', () => fi.click());
  fi.addEventListener('change', e => setFile(e.target.files[0]));
  zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
  zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });

  function setFile(f) {
    selectedFile = f;
    document.getElementById('fileInfo').textContent = `✓ ${f.name} — ${(f.size/1024/1024).toFixed(0)} Mo`;
    zone.classList.add('has-file');
  }

  /* ── UI HELPERS ── */
  const setProgress = (pct, txt) => { document.getElementById('progressBar').style.width = pct+'%'; document.getElementById('progressStatus').textContent = txt; };
  const showErr  = msg => { const b=document.getElementById('errorBox'); b.textContent=msg; b.classList.add('visible'); };
  const hideErr  = ()  => document.getElementById('errorBox').classList.remove('visible');
  const showProg = ()  => document.getElementById('progressWrap').classList.add('visible');
  const hideProg = ()  => document.getElementById('progressWrap').classList.remove('visible');
  const showRes  = ()  => document.getElementById('results').classList.add('visible');
  const hideRes  = ()  => document.getElementById('results').classList.remove('visible');

  function resetForm() {
    selectedFile = null; fi.value = '';
    document.getElementById('fileInfo').textContent = '';
    zone.classList.remove('has-file');
    hideRes(); hideProg(); hideErr();
  }

  /* ── ANALYZE ── */
  async function analyze() {
    hideErr();
    const apiKey = document.getElementById('apiKey').value.trim();
    const hero   = document.getElementById('heroSelect').value;
    const rank   = document.getElementById('rankSelect').value;

    if (!apiKey)       return showErr('Entre ta clé API Gemini.');
    if (!selectedFile) return showErr('Sélectionne une VOD.');

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    showProg(); hideRes();

    try {
      setProgress(10, 'Envoi de la vidéo...');
      const form = new FormData();
      form.append('api_key', apiKey);
      form.append('hero', hero);
      form.append('rank', rank);
      form.append('video', selectedFile);

      setProgress(25, 'Upload en cours… (peut prendre quelques minutes)');
      const res  = await fetch(SERVER_URL + '/analyze', { method:'POST', body:form });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Erreur serveur ' + res.status);

      setProgress(100, 'Analyse terminée !');
      renderResults(data);
    } catch (err) {
      showErr('Erreur : ' + err.message);
      hideProg();
    } finally {
      btn.disabled = false;
    }
  }

  /* ── RENDER ── */
  function renderResults(data) {
    document.getElementById('summaryText').textContent = data.summary || '';
    document.getElementById('timestampList').innerHTML = (data.timestamps||[]).map((ts,i) => {
      const cat = CATEGORIES[ts.category] || { label:ts.category, cls:'cat-ulti' };
      return `<div class="ts-item">
        <div class="ts-head" onclick="toggle(${i})">
          <div class="ts-time">${ts.time}</div>
          <div class="ts-cat ${cat.cls}">${cat.label}</div>
          <div class="ts-title">${ts.title}</div>
          <div class="ts-chev" id="chev-${i}">▼</div>
        </div>
        <div class="ts-body" id="body-${i}">${ts.description}</div>
      </div>`;
    }).join('');
    document.getElementById('priorityList').innerHTML = (data.priorities||[]).map((p,i) =>
      `<div class="priority-item"><div class="priority-num">${i+1}.</div><div class="priority-text">${p}</div></div>`
    ).join('');
    hideProg(); showRes();
  }

  function toggle(i) {
    const b = document.getElementById('body-'+i);
    const c = document.getElementById('chev-'+i);
    c.textContent = b.classList.toggle('open') ? '▲' : '▼';
  }
</script>
</body>
</html>
