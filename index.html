<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OW VOD Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>

    /* ─────────────────────────────────────────
       DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      --bg:       #0a0c10;
      --bg2:      #0f1218;
      --bg3:      #161b24;
      --border:   #1e2530;
      --border2:  #2a3342;
      --accent:   #f5a623;
      --blue:     #4a9eff;
      --green:    #3ecf8e;
      --red:      #ff4d6d;
      --purple:   #a78bfa;
      --text:     #e8edf5;
      --text2:    #8b95a8;
      --text3:    #4a5568;
      --font-display: 'Rajdhani', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.025) 2px, rgba(0,0,0,0.025) 4px);
      pointer-events: none;
      z-index: 999;
    }

    /* ── Header ── */
    .header {
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .logo span { color: var(--text3); font-weight: 500; }
    .badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 8px;
      border: 1px solid var(--border2);
      border-radius: 3px;
      color: var(--text3);
    }

    /* ── Layout ── */
    .main { padding: 28px 32px; max-width: 900px; margin: 0 auto; }

    /* ── Form elements ── */
    input[type="password"], input[type="text"], select {
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 5px;
      padding: 7px 12px;
      font-size: 13px;
      color: var(--text);
      outline: none;
      font-family: var(--font-body);
      transition: border-color 0.2s;
    }
    input[type="password"]:focus, input[type="text"]:focus, select:focus { border-color: var(--accent); }
    input[type="password"]::placeholder { color: var(--text3); }
    select option { background: var(--bg3); }
    input[type="file"] { display: none; }

    /* ── API Row ── */
    .api-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
    }
    .api-row label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text2);
      white-space: nowrap;
    }
    .api-row a { color: var(--blue); font-size: 12px; text-decoration: none; }
    .api-row a:hover { text-decoration: underline; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 1.5px dashed var(--border2);
      border-radius: 10px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: var(--bg2);
      margin-bottom: 20px;
    }
    .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(245,166,35,0.04); }
    .upload-zone.has-file { border-style: solid; border-color: var(--green); background: rgba(62,207,142,0.04); }
    .upload-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.35; }
    .upload-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .upload-sub { font-size: 12px; color: var(--text2); }
    .upload-info { font-size: 13px; color: var(--green); margin-top: 10px; font-weight: 500; }

    /* ── Video player ── */
    .video-wrap {
      display: none;
      margin-bottom: 20px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    .video-wrap.visible { display: block; }
    .video-wrap video {
      width: 100%;
      max-height: 420px;
      display: block;
      background: #000;
    }
    .video-label {
      position: absolute;
      top: 10px;
      left: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      background: rgba(0,0,0,0.6);
      padding: 3px 8px;
      border-radius: 3px;
      pointer-events: none;
    }

    /* ── Config row ── */
    .config-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .config-block { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; }
    .config-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 7px;
    }

    /* ── Error ── */
    .error-box {
      background: rgba(255,77,109,0.08);
      border: 1px solid rgba(255,77,109,0.25);
      border-radius: 7px;
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
      display: none;
      margin-bottom: 14px;
    }
    .error-box.visible { display: block; }

    /* ── Analyze button ── */
    .analyze-btn {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      border: none;
      border-radius: 7px;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #0a0c10;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      margin-bottom: 24px;
    }
    .analyze-btn:hover:not(:disabled) { background: #e8962a; transform: translateY(-1px); }
    .analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── Progress ── */
    .progress-wrap { display: none; margin-bottom: 24px; }
    .progress-wrap.visible { display: block; }
    .progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 8px; }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--blue));
      width: 0%;
      transition: width 0.5s;
      border-radius: 2px;
    }
    .progress-status { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 8px; }
    .blink-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 1s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Results ── */
    .results { display: none; }
    .results.visible { display: block; }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .results-title { font-family: var(--font-display); font-size: 19px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .reset-btn {
      padding: 6px 14px;
      background: none;
      border: 1px solid var(--border2);
      border-radius: 5px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      font-family: var(--font-body);
      transition: border-color 0.2s, color 0.2s;
    }
    .reset-btn:hover { border-color: var(--text2); color: var(--text); }

    /* ── Summary ── */
    .summary-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      margin-bottom: 20px;
    }
    .summary-card h3 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .summary-text { font-size: 13px; line-height: 1.75; color: var(--text2); }
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }

    /* ── Timestamps ── */
    .ts-item { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .ts-head { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; }
    .ts-head:hover { background: rgba(255,255,255,0.02); }
    .ts-time { font-family: var(--font-display); font-size: 17px; font-weight: 700; color: var(--accent); min-width: 48px; letter-spacing: 0.04em; }
    .ts-category { font-size: 10px; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; padding: 2px 8px; border-radius: 3px; }
    .cat-death       { background: rgba(255,77,109,0.12);  color: var(--red);    border: 1px solid rgba(255,77,109,0.25); }
    .cat-mistake     { background: rgba(245,166,35,0.10);  color: var(--accent); border: 1px solid rgba(245,166,35,0.20); }
    .cat-good        { background: rgba(62,207,142,0.10);  color: var(--green);  border: 1px solid rgba(62,207,142,0.20); }
    .cat-positioning { background: rgba(74,158,255,0.10);  color: var(--blue);   border: 1px solid rgba(74,158,255,0.20); }
    .cat-ulti        { background: rgba(167,139,250,0.10); color: var(--purple); border: 1px solid rgba(167,139,250,0.20); }
    .ts-title { font-size: 13px; font-weight: 500; flex: 1; color: var(--text); }
    .ts-chevron { font-size: 12px; color: var(--text3); transition: transform 0.2s; }
    .ts-body { padding: 12px 16px; font-size: 13px; line-height: 1.7; color: var(--text2); border-top: 1px solid var(--border); display: none; }
    .ts-body.open { display: block; }

    /* ── Priorities ── */
    .priorities-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--blue);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      margin-top: 20px;
    }
    .priorities-card h3 {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 12px;
    }
    .priority-item { display: flex; gap: 10px; margin-bottom: 9px; }
    .priority-num { font-family: var(--font-display); font-size: 15px; font-weight: 700; color: var(--text3); min-width: 18px; }
    .priority-text { font-size: 13px; line-height: 1.65; color: var(--text2); }

  </style>
</head>
<body>

<header class="header">
  <div class="logo">OW <span>/</span> VOD Analyzer</div>
  <div class="badge">Client-side · Gemini</div>
</header>

<main class="main">

  <div class="api-row">
    <label for="apiKey">Clé API Gemini</label>
    <input type="password" id="apiKey" placeholder="AIza..." style="flex:1">
    <a href="https://aistudio.google.com/app/apikey" target="_blank">Obtenir une clé ↗</a>
  </div>

  <input type="file" id="fileInput" accept="video/*">
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">🎬</div>
    <div class="upload-title">Dépose ta VOD ici</div>
    <div class="upload-sub">MP4, MOV — jusqu'à 2 Go</div>
    <div class="upload-info" id="fileInfo"></div>
  </div>

  <!-- Lecteur VOD intégré -->
  <div class="video-wrap" id="videoWrap">
    <div class="video-label">VOD</div>
    <video id="videoPlayer" controls preload="metadata"></video>
  </div>

  <div class="config-row">
    <div class="config-block">
      <div class="config-label">Personnage</div>
      <select id="heroSelect" style="width:100%"></select>
    </div>
    <div class="config-block">
      <div class="config-label">Rank</div>
      <select id="rankSelect" style="width:100%"></select>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>
  <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">⚡ Analyser la VOD</button>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-track">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-status">
      <div class="blink-dot"></div>
      <span id="progressStatus">Chargement...</span>
    </div>
  </div>

  <div class="results" id="results">
    <div class="results-header">
      <div class="results-title">Rapport de coaching</div>
      <button class="reset-btn" onclick="resetForm()">Nouvelle analyse</button>
    </div>
    <div class="summary-card">
      <h3>Résumé global</h3>
      <div class="summary-text" id="summaryText"></div>
    </div>
    <div class="section-label">Moments clés</div>
    <div id="timestampList"></div>
    <div class="priorities-card">
      <h3>Priorités à travailler</h3>
      <div id="priorityList"></div>
    </div>
  </div>

</main>

<script>

  /* ─────────────────────────────────────────
     CONFIG
  ───────────────────────────────────────── */

  const GEMINI_MODEL = 'gemini-2.5-flash'; // Modèle à changer ici si besoin

  const RANKS = [
    'Bronze', 'Argent', 'Or', 'Platine', 'Diamant',
    'Maître', 'Grand Maître', 'Champion', 'Top 500',
  ];
  const DEFAULT_RANK = 'Diamant';
  const DEFAULT_HERO = 'Tracer';

  // Pour ajouter une catégorie : ajouter ici + règle CSS .cat-xxx
  const CATEGORIES = {
    death:       { label: 'Mort',       cssClass: 'cat-death' },
    mistake:     { label: 'Erreur',     cssClass: 'cat-mistake' },
    good:        { label: 'Bon moment', cssClass: 'cat-good' },
    positioning: { label: 'Position',   cssClass: 'cat-positioning' },
    ulti:        { label: 'Ulti',       cssClass: 'cat-ulti' },
  };

  // Pour ajouter un héros : ajouter dans la bonne liste
  const HEROES = {
    Tank: [
      'D.Va', 'Domina', 'Doomfist', 'Hazard', 'Junker Queen', 'Mauga',
      'Orisa', 'Ramattra', 'Reinhardt', 'Roadhog', 'Sigma', 'Winston',
      'Wrecking Ball', 'Zarya',
    ],
    Damage: [
      'Anran', 'Ashe', 'Bastion', 'Cassidy', 'Echo', 'Emre', 'Freja',
      'Genji', 'Hanzo', 'Junkrat', 'Mei', 'Pharah', 'Reaper', 'Sierra',
      'Sojourn', 'Soldier: 76', 'Sombra', 'Symmetra', 'Torbjörn',
      'Tracer', 'Vendetta', 'Venture', 'Widowmaker',
    ],
    Support: [
      'Ana', 'Baptiste', 'Brigitte', 'Illari', 'Jetpack Cat', 'Juno',
      'Kiriko', 'Lifeweaver', 'Lúcio', 'Mercy', 'Mizuki', 'Moira',
      'Wuyang', 'Zenyatta',
    ],
  };

  const HEROES_FLAT = Object.entries(HEROES)
    .flatMap(([cls, heroes]) => [...heroes].sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' })));

  /* ─────────────────────────────────────────
     INIT
  ───────────────────────────────────────── */

  function initSelects() {
    const rankSel = document.getElementById('rankSelect');
    RANKS.forEach(r => {
      const o = document.createElement('option');
      o.value = r; o.textContent = r;
      if (r === DEFAULT_RANK) o.selected = true;
      rankSel.appendChild(o);
    });

    const heroSel = document.getElementById('heroSelect');
    const CLASS_ICONS = { Tank: '🛡️ Tank', Damage: '⚔️ Damage', Support: '💚 Support' };
    Object.entries(HEROES).forEach(([className, heroes]) => {
      const group = document.createElement('optgroup');
      group.label = CLASS_ICONS[className] || className;
      [...heroes].sort((a, b) => a.localeCompare(b, 'fr', { sensitivity: 'base' })).forEach(h => {
        const o = document.createElement('option');
        o.value = h; o.textContent = h;
        if (h === DEFAULT_HERO) o.selected = true;
        group.appendChild(o);
      });
      heroSel.appendChild(group);
    });
  }

  initSelects();

  /* ─────────────────────────────────────────
     UPLOAD ZONE
  ───────────────────────────────────────── */

  let selectedFile = null;
  const uploadZone = document.getElementById('uploadZone');
  const fileInput  = document.getElementById('fileInput');

  uploadZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => setFile(e.target.files[0]));
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  function setFile(file) {
    selectedFile = file;
    const mb = (file.size / 1024 / 1024).toFixed(0);
    document.getElementById('fileInfo').textContent = `✓ ${file.name} — ${mb} Mo`;
    uploadZone.classList.add('has-file');

    // Charger la vidéo dans le lecteur
    const player = document.getElementById('videoPlayer');
    const wrap   = document.getElementById('videoWrap');
    if (player.src) URL.revokeObjectURL(player.src); // libérer l'ancien blob
    player.src = URL.createObjectURL(file);
    wrap.classList.add('visible');
  }

  /* ─────────────────────────────────────────
     UI HELPERS
  ───────────────────────────────────────── */

  function setProgress(pct, text) {
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressStatus').textContent = text;
  }
  function showError(msg) {
    const b = document.getElementById('errorBox');
    b.textContent = msg; b.classList.add('visible');
  }
  function hideError() { document.getElementById('errorBox').classList.remove('visible'); }
  function showProgress() { document.getElementById('progressWrap').classList.add('visible'); }
  function hideProgress() { document.getElementById('progressWrap').classList.remove('visible'); }
  function showResults() { document.getElementById('results').classList.add('visible'); }
  function hideResults() { document.getElementById('results').classList.remove('visible'); }

  function resetForm() {
    selectedFile = null;
    fileInput.value = '';
    document.getElementById('fileInfo').textContent = '';
    uploadZone.classList.remove('has-file');

    // Vider le lecteur vidéo
    const player = document.getElementById('videoPlayer');
    const wrap   = document.getElementById('videoWrap');
    if (player.src) URL.revokeObjectURL(player.src);
    player.src = '';
    wrap.classList.remove('visible');

    hideResults(); hideProgress(); hideError();
  }

  /* ─────────────────────────────────────────
     GEMINI FILES API — upload direct depuis le navigateur
  ───────────────────────────────────────── */

  const BASE = 'https://generativelanguage.googleapis.com';

  async function uploadToGemini(apiKey, file) {
    setProgress(30, `Upload en cours… (${(file.size/1024/1024).toFixed(0)} Mo)`);

    // Upload multipart — pas de headers custom, compatible CORS navigateur
    const metadata = JSON.stringify({ file: { display_name: file.name } });
    const body = new FormData();
    body.append('metadata', new Blob([metadata], { type: 'application/json' }));
    body.append('file', new Blob([await file.arrayBuffer()], { type: file.type }));

    const res = await fetch(
      `${BASE}/upload/v1beta/files?uploadType=multipart&key=${apiKey}`,
      { method: 'POST', body }
    );

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'Erreur upload : ' + res.status);
    }

    const data = await res.json();
    return data.file; // { name, uri, state, ... }
  }

  async function waitForActive(apiKey, fileName) {
    setProgress(55, 'Traitement de la vidéo par Gemini…');
    for (let i = 0; i < 30; i++) {
      const res  = await fetch(`${BASE}/v1beta/${fileName}?key=${apiKey}`);
      const data = await res.json();
      if (data.state === 'ACTIVE') return data;
      if (data.state === 'FAILED') throw new Error('Traitement vidéo échoué côté Gemini');
      await new Promise(r => setTimeout(r, 3000));
    }
    throw new Error('Timeout — la vidéo met trop longtemps à traiter');
  }

  /* ─────────────────────────────────────────
     HERO CONTEXT — kit complet par héros
  ───────────────────────────────────────── */

  const HERO_CONTEXT = {
    // ── TANK ──
    'D.Va':          "Kit: Boosters (dash), Defense Matrix (mange les projectiles), Micro Missiles, Self-Destruct (ulti). Points clés: timing Defense Matrix sur les ultis ennemis critiques (Sound Barrier, Coalescence…), usage offensif vs défensif des Boosters, placement du Self-Destruct pour forcer repositionnement, gestion du remech (ne pas mourir hors mech inutilement).",
    'Domina':        "Héros récent. Analyser: usage des capacités de contrôle, positionnement en tant que tank, timing des engagements et des retraites, coordination avec les supports.",
    'Doomfist':      "Kit: Seismic Slam, Rocket Punch (charge), Power Block (parry → Meteor Strike empowered). Points clés: combos pour burst (Slam+Punch), Power Block timing sur gros dégâts, Meteor Strike pour repositionnement ou engage, survie via les boucliers générés par les dégâts.",
    'Hazard':        "Héros récent. Analyser: kit de mobilité, engagement/disengage, usage des cooldowns défensifs, pression sur les backlines.",
    'Junker Queen': "Kit: Carnage (hache, wound), Commanding Shout (ulti pseudo), Jagged Blade (recall), Rampage (ulti). Points clés: maintenir les wounds actifs pour le sustain, Commanding Shout pour engage ou disengage, Rampage timing pour anti-heal sur cibles critiques, agressivité contrôlée.",
    'Mauga':         "Kit: deux chainguns (Incendiary + Volatile), Cardiac Overdrive (sustain), Cage Fight (ulti). Points clés: gestion des deux modes de chaingun, Cardiac Overdrive timing (offense vs defense), Cage Fight placement pour isoler un ennemi, sustain via les dégâts enflammés.",
    'Orisa':         "Kit: Javelin Spin (bloque projectiles + push), Energy Javelin (stun), Fortify (invulnérabilité partielle + CC immunity), Terra Surge (ulti charge). Points clés: Fortify sur les ultis ennemis, combo Javelin stun + Terra Surge, Spin pour traverser les chokes, pression constante sans overextend.",
    'Ramattra':      "Kit: Nemesis Form (bras de mêlée + shield), Void Accelerator (projectiles), Annihilation (ulti). Points clés: switch Nemesis Form au bon moment (engage vs sustain), Annihilation pour hold un point ou teamfight, positionnement pour maximiser les hits en Nemesis, coordination avec les supports pour survivre en forme.",

function buildPrompt(hero, rank) {
    return `Tu es l'unité tactique "ARCHITECTE OW", coach Top 500. Analyse cette VOD de ${hero} au rang ${rank}.

STRICTE DISCIPLINE VISUELLE (ANTI-HALLUCINATION) :
1. ANALYSE DU TAB : Au début de la vidéo, identifie précisément les 5 héros ennemis. NE PARLE JAMAIS d'un héros qui n'est pas présent dans la partie (ex: ne parle pas de Zenyatta s'il n'est pas là).
2. VÉRIFICATION DU KILL FEED : Avant de noter une mort ou un kill, vérifie le journal en haut à droite.
3. LECTURE DU HUD : Regarde tes propres cooldowns en bas à droite pour confirmer si une capacité était réellement disponible ou non.

CADRE D'ANALYSE :
- FOCUS MÉCANIQUE : Analyse l'utilisation du kit de ${hero} (timing, précision, gestion des ressources).
- POSITIONNEMENT : Analyse les angles de tir et l'utilisation des couvertures naturelles.
- ERREURS DE RANG : Adapte la sévérité au niveau ${rank}.

RÉPONDS UNIQUEMENT EN JSON VALIDE :
{
  "summary": "Diagnostic global honnête basé uniquement sur ce qui est visible.",
  "timestamps": [
    {
      "time": "MM:SS",
      "category": "death|mistake|positioning|ulti|good",
      "title": "[ACTION] - Verdict",
      "description": "Analyse technique REELLEMENT visible à l'écran. Si rien de spécial ne se passe à ce timing, ne crée pas d'entrée bidon."
    }
  ],
  "priorities": [
    "Priorité 1 basée sur une erreur répétée dans la vidéo.",
    "Priorité 2",
    "Priorité 3"
  ]
}

IMPORTANT : Ne dépasse pas 6 à 8 moments si la vidéo est courte. Mieux vaut 4 moments vrais que 10 moments inventés. Sois froid et factuel.`;
  }

Identifie 8 à 12 moments clés significatifs. Priorise les moments où le kit est mal utilisé.`;
  }

  async function generateAnalysis(apiKey, fileUri, fileMime, hero, rank) {
    setProgress(75, 'Analyse IA en cours…');

    const prompt = buildPrompt(hero, rank);

    const res = await fetch(
      `${BASE}/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { file_data: { file_uri: fileUri, mime_type: fileMime } },
              { text: prompt },
            ],
          }],
        }),
      }
    );

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.candidates[0].content.parts[0].text
      .replace(/```json|```/g, '').trim();
    return JSON.parse(raw);
  }

  async function deleteFile(apiKey, fileName) {
    try {
      await fetch(`${BASE}/v1beta/${fileName}?key=${apiKey}`, { method: 'DELETE' });
    } catch {}
  }

  /* ─────────────────────────────────────────
     ANALYZE — action principale
  ───────────────────────────────────────── */

  async function analyze() {
    hideError();

    const apiKey = document.getElementById('apiKey').value.trim();
    const hero   = document.getElementById('heroSelect').value;
    const rank   = document.getElementById('rankSelect').value;

    if (!apiKey)       return showError('Entre ta clé API Gemini.');
    if (!selectedFile) return showError('Sélectionne une VOD.');

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    showProgress();
    hideResults();

    let uploadedFileName = null;

    try {
      setProgress(10, 'Connexion à Gemini…');

      const fileInfo = await uploadToGemini(apiKey, selectedFile);
      uploadedFileName = fileInfo.name;

      const activeFile = await waitForActive(apiKey, fileInfo.name);
      const parsed = await generateAnalysis(apiKey, activeFile.uri, selectedFile.type, hero, rank);

      setProgress(100, 'Analyse terminée !');
      renderResults(parsed);

    } catch (err) {
      showError('Erreur : ' + err.message);
      hideProgress();
    } finally {
      btn.disabled = false;
      if (uploadedFileName) deleteFile(apiKey, uploadedFileName);
    }
  }

  /* ─────────────────────────────────────────
     RENDER RESULTS
  ───────────────────────────────────────── */

  function renderResults(data) {
    document.getElementById('summaryText').textContent = data.summary || '';
    renderTimestamps(data.timestamps || []);
    renderPriorities(data.priorities || []);
    hideProgress();
    showResults();
  }

  function renderTimestamps(timestamps) {
    document.getElementById('timestampList').innerHTML = timestamps.map((ts, i) => {
      const cat = CATEGORIES[ts.category] || { label: ts.category, cssClass: 'cat-ulti' };
      return `
        <div class="ts-item">
          <div class="ts-head" onclick="toggleTimestamp(${i})">
            <div class="ts-time">${ts.time}</div>
            <div class="ts-category ${cat.cssClass}">${cat.label}</div>
            <div class="ts-title">${ts.title}</div>
            <div class="ts-chevron" id="chev-${i}">▼</div>
          </div>
          <div class="ts-body" id="body-${i}">${ts.description}</div>
        </div>`;
    }).join('');
  }

  function renderPriorities(priorities) {
    document.getElementById('priorityList').innerHTML = priorities.map((text, i) => `
      <div class="priority-item">
        <div class="priority-num">${i + 1}.</div>
        <div class="priority-text">${text}</div>
      </div>`).join('');
  }

  function toggleTimestamp(index) {
    const body    = document.getElementById(`body-${index}`);
    const chevron = document.getElementById(`chev-${index}`);
    chevron.textContent = body.classList.toggle('open') ? '▲' : '▼';
  }

</script>
