<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>OW Coach AI - Gemini 3 Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #111; color: white; text-align: center; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: #222; padding: 30px; border-radius: 15px; border: 2px solid #fa9c1e; box-shadow: 0 0 20px rgba(250, 156, 30, 0.2); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; box-sizing: border-box; }
        input { background: #000; color: #fa9c1e; border: 1px solid #444; }
        button { background: #fa9c1e; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #drop-zone { border: 2px dashed #4096ee; padding: 40px; margin: 15px 0; border-radius: 10px; cursor: pointer; background: rgba(0,0,0,0.4); }
        #res { text-align: left; background: #000; padding: 20px; margin-top: 20px; border-radius: 8px; display: none; white-space: pre-wrap; line-height: 1.5; border-left: 5px solid #fa9c1e; }
        .status-msg { color: #4096ee; display: none; font-weight: bold; margin: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#fa9c1e; margin-bottom: 5px;">OW COACH AI</h2>
        <p style="margin-top: 0; font-size: 0.8em; color: #888;">Propulsé par Gemini 3 Flash Preview</p>
        
        <input type="password" id="key" placeholder="Ta clé API Gemini">
        
        <div id="drop-zone"><b>GLISSE TA VOD MP4 ICI</b></div>
        
        <button id="btn">🚀 ANALYSER LE GAMEPLAY</button>
        <div id="status" class="status-msg">⏳ Gemini 3 analyse la vidéo... (Veuillez patienter)</div>
        <div id="res"></div>
    </div>

<script>
    let videoFile = null;
    const dz = document.getElementById('drop-zone');

    dz.ondragover = (e) => e.preventDefault();
    dz.ondrop = (e) => {
        e.preventDefault();
        videoFile = e.dataTransfer.files[0];
        dz.innerHTML = "<b style='color:#fa9c1e;'>✅ Vidéo chargée :</b><br>" + videoFile.name;
    };

    document.getElementById('btn').onclick = async () => {
        const key = document.getElementById('key').value.trim();
        if (!key || !videoFile) return alert("Il manque la clé ou le fichier vidéo !");

        const status = document.getElementById('status');
        const resBox = document.getElementById('res');
        
        status.style.display = 'block';
        resBox.style.display = 'none';

        const reader = new FileReader();
        reader.readAsDataURL(videoFile);
        reader.onloadend = async () => {
            const base64Data = reader.result.split(',')[1];

            // URL EXACTE POUR GEMINI 3 (Beta requise pour Preview)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`;

            const payload = {
                contents: [{
                    parts: [
                        { text: "Tu es un coach professionnel d'Overwatch Top 500. Analyse ce clip et donne 3 points d'amélioration précis en français." },
                        { 
                            inlineData: { 
                                mimeType: "video/mp4", 
                                data: base64Data 
                            } 
                        }
                    ]
                }]
            };

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                status.style.display = 'none';

                if (data.error) {
                    resBox.innerHTML = "<b style='color:red;'>Erreur :</b> " + data.error.message;
                } else if (data.candidates && data.candidates[0].content) {
                    resBox.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    resBox.innerText = "Gemini n'a pas pu analyser cette vidéo. Vérifie que le clip n'est pas trop long.";
                }
                resBox.style.display = 'block';

            } catch (err) {
                status.style.display = 'none';
                alert("Erreur de connexion : " + err.message);
            }
        };
    };
</script>
</body>
</html>
