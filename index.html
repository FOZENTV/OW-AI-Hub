<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OW VOD Analyzer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap');
  :root{--bg:#0a0c10;--bg2:#0f1218;--bg3:#161b24;--border:#1e2530;--border2:#2a3342;--accent:#f5a623;--blue:#4a9eff;--green:#3ecf8e;--red:#ff4d6d;--purple:#a78bfa;--text:#e8edf5;--text2:#8b95a8;--text3:#4a5568}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:999}
  .header{padding:18px 28px;border-bottom:1px solid var(--border);background:var(--bg2);display:flex;align-items:center;gap:12px}
  .logo{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--accent)}
  .logo span{color:var(--text3);font-weight:500}
  .badge{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--border2);border-radius:3px;color:var(--text3)}
  .layout{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:calc(100vh - 57px)}
  .left{padding:24px 28px;border-right:1px solid var(--border);overflow-y:auto}
  .right{padding:24px 28px;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
  .section-title{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
  .api-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
  .api-row label{font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text2);white-space:nowrap}
  input[type=password],select{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:7px 11px;font-size:13px;color:var(--text);outline:none;font-family:'Inter',sans-serif;transition:border-color 0.2s}
  input[type=password]:focus,select:focus{border-color:var(--accent)}
  input[type=password]::placeholder{color:var(--text3)}
  select option,select optgroup{background:var(--bg3)}
  .upload-zone{border:1.5px dashed var(--border2);border-radius:10px;padding:28px 16px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--bg2);margin-bottom:14px}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(245,166,35,0.04)}
  .upload-zone.has{border-style:solid;border-color:var(--green);background:rgba(62,207,142,0.04)}
  .upload-icon{font-size:28px;margin-bottom:8px;opacity:0.35}
  .upload-title{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;margin-bottom:4px}
  .upload-sub{font-size:12px;color:var(--text2)}
  .upload-info{font-size:12px;color:var(--green);margin-top:8px;font-weight:500}
  .config-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
  .config-block{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
  .analyze-btn{width:100%;padding:12px;background:var(--accent);border:none;border-radius:7px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#0a0c10;cursor:pointer;transition:all 0.2s;margin-bottom:16px}
  .analyze-btn:hover:not(:disabled){background:#e8962a;transform:translateY(-1px)}
  .analyze-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
  .prog-wrap{display:none;margin-bottom:16px}
  .prog-wrap.on{display:block}
  .prog-bg{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px}
  .prog-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue));width:0%;transition:width 0.5s;border-radius:2px}
  .prog-status{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:8px}
  .dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1s infinite;flex-shrink:0}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  .err{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25);border-radius:7px;padding:10px 14px;font-size:13px;color:var(--red);display:none;margin-bottom:12px}
  .err.on{display:block}

  /* Video player */
  .video-wrap{display:none;margin-bottom:14px}
  .video-wrap.on{display:block}
  .video-wrap video{width:100%;border-radius:8px;background:#000;border:1px solid var(--border)}
  .video-controls{display:flex;gap:8px;margin-top:6px;align-items:center}
  .video-time{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums;min-width:80px}

  /* Results */
  .results{display:none}.results.on{display:block}
  .results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .results-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
  .reset-btn{padding:5px 12px;background:none;border:1px solid var(--border2);border-radius:5px;font-size:11px;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s}
  .reset-btn:hover{border-color:var(--text2);color:var(--text)}
  .summary-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:14px 16px;margin-bottom:16px}
  .summary-card h3{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
  .summary-text{font-size:13px;line-height:1.75;color:var(--text2)}
  .ts-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;transition:border-color 0.2s}
  .ts-item:hover{border-color:var(--border2)}
  .ts-item.active{border-color:var(--accent)}
  .ts-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer}
  .ts-head:hover{background:rgba(255,255,255,0.02)}
  .ts-time{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;color:var(--accent);min-width:44px;letter-spacing:0.04em;cursor:pointer;transition:opacity 0.2s}
  .ts-time:hover{opacity:0.7}
  .ts-cat{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;padding:2px 7px;border-radius:3px;flex-shrink:0}
  .cat-death{background:rgba(255,77,109,0.12);color:var(--red);border:1px solid rgba(255,77,109,0.25)}
  .cat-mistake{background:rgba(245,166,35,0.1);color:var(--accent);border:1px solid rgba(245,166,35,0.2)}
  .cat-good{background:rgba(62,207,142,0.1);color:var(--green);border:1px solid rgba(62,207,142,0.2)}
  .cat-positioning{background:rgba(74,158,255,0.1);color:var(--blue);border:1px solid rgba(74,158,255,0.2)}
  .cat-ulti{background:rgba(167,139,250,0.1);color:var(--purple);border:1px solid rgba(167,139,250,0.2)}
  .ts-title{font-size:13px;font-weight:500;flex:1;color:var(--text)}
  .ts-chev{font-size:11px;color:var(--text3);flex-shrink:0}
  .ts-body{padding:10px 14px;font-size:13px;line-height:1.7;color:var(--text2);border-top:1px solid var(--border);display:none}
  .ts-body.open{display:block}
  .ts-screenshot{margin-top:10px;border-radius:6px;overflow:hidden;border:1px solid var(--border2)}
  .ts-screenshot img{width:100%;display:block;opacity:0.9;transition:opacity 0.2s}
  .ts-screenshot img:hover{opacity:1}
  .prio-card{background:var(--bg2);border:1px solid var(--border);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:14px 16px;margin-top:16px}
  .prio-card h3{font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--blue);margin-bottom:10px}
  .prio-item{display:flex;gap:10px;margin-bottom:8px}
  .prio-num{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;color:var(--text3);min-width:16px}
  .prio-text{font-size:13px;line-height:1.65;color:var(--text2)}
  input[type=file]{display:none}
  a{color:var(--blue);font-size:12px}

  @media(max-width:768px){
    .layout{grid-template-columns:1fr}
    .left{border-right:none;border-bottom:1px solid var(--border)}
  }
</style>
</head>
<body>
<div class="header">
  <div class="logo">OW <span>/</span> VOD Analyzer</div>
  <div class="badge">Gemini 2.5 Pro</div>
</div>

<div class="layout">
  <!-- LEFT : Upload + config -->
  <div class="left">
    <div class="api-row">
      <label>API Gemini</label>
      <input type="password" id="apiKey" placeholder="AIza..." style="flex:1">
      <a href="https://aistudio.google.com/app/apikey" target="_blank">Clé ↗</a>
    </div>

    <input type="file" id="fileInput" accept="video/*">
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">🎬</div>
      <div class="upload-title">Dépose ta VOD ici</div>
      <div class="upload-sub">MP4, MOV — jusqu'à 2 Go</div>
      <div class="upload-info" id="fileInfo"></div>
    </div>

    <!-- Video player -->
    <div class="video-wrap" id="videoWrap">
      <video id="videoPlayer" controls></video>
    </div>

    <div class="config-row">
      <div class="config-block">
        <div class="section-title">Personnage</div>
        <select id="heroSelect" style="width:100%"></select>
      </div>
      <div class="config-block">
        <div class="section-title">Rank</div>
        <select id="rankSelect" style="width:100%">
          <option>Bronze</option><option>Argent</option><option>Or</option>
          <option>Platine</option><option selected>Diamant</option>
          <option>Maître</option><option>Grand Maître</option>
        </select>
      </div>
    </div>

    <div class="err" id="errBox"></div>
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">⚡ Analyser la VOD</button>

    <div class="prog-wrap" id="progWrap">
      <div class="prog-bg"><div class="prog-bar" id="progBar"></div></div>
      <div class="prog-status"><div class="dot"></div><span id="progStatus">Chargement...</span></div>
    </div>
  </div>

  <!-- RIGHT : Results -->
  <div class="right">
    <div class="results" id="results">
      <div class="results-header">
        <div class="results-title">Rapport de coaching</div>
        <button class="reset-btn" onclick="resetAll()">Nouvelle analyse</button>
      </div>
      <div class="summary-card">
        <h3>Résumé global</h3>
        <div class="summary-text" id="summaryText"></div>
      </div>
      <div class="section-title">Moments clés</div>
      <div id="tsList"></div>
      <div class="prio-card">
        <h3>Priorités à travailler</h3>
        <div id="prioList"></div>
      </div>
    </div>
    <div id="emptyState" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);text-align:center;gap:10px">
      <div style="font-size:40px;opacity:0.2">📋</div>
      <div style="font-size:13px">L'analyse apparaîtra ici</div>
    </div>
  </div>
</div>

<script>
const SERVER_URL = "https://ow-vod-analyzer.onrender.com";
let file = null;
let videoObjectUrl = null;

// ── HEROES ──────────────────────────────────────────────────────────────────
async function loadHeroes() {
  try {
    const res = await fetch(SERVER_URL + "/heroes");
    const data = await res.json();
    const sel = document.getElementById('heroSelect');
    // data est un objet {Tank:[...], Damage:[...], Support:[...]}
    const order = ["Tank", "Damage", "Support"];
    order.forEach(role => {
      if (!data[role]) return;
      const grp = document.createElement('optgroup');
      grp.label = role;
      data[role].forEach(h => {
        const o = document.createElement('option');
        o.value = h; o.textContent = h;
        if (h === 'Tracer') o.selected = true;
        grp.appendChild(o);
      });
      sel.appendChild(grp);
    });
  } catch(e) {
    // Fallback liste basique
    const sel = document.getElementById('heroSelect');
    ["Tracer","Genji","Ana","Reinhardt","D.Va","Mercy"].forEach(h => {
      const o = document.createElement('option');
      o.value = h; o.textContent = h;
      sel.appendChild(o);
    });
  }
}

loadHeroes();

// ── UPLOAD ZONE ──────────────────────────────────────────────────────────────
const zone = document.getElementById('uploadZone'), fi = document.getElementById('fileInput');
zone.addEventListener('click', () => fi.click());
fi.addEventListener('change', e => setFile(e.target.files[0]));
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
  e.preventDefault(); zone.classList.remove('drag');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

function setFile(f) {
  file = f;
  document.getElementById('fileInfo').textContent = '✓ ' + f.name + ' — ' + (f.size/1024/1024).toFixed(0) + ' Mo';
  zone.classList.add('has');
  // Afficher le player vidéo
  if (videoObjectUrl) URL.revokeObjectURL(videoObjectUrl);
  videoObjectUrl = URL.createObjectURL(f);
  const player = document.getElementById('videoPlayer');
  player.src = videoObjectUrl;
  document.getElementById('videoWrap').classList.add('on');
}

// ── VIDEO NAVIGATION ─────────────────────────────────────────────────────────
function seekTo(timeStr) {
  const player = document.getElementById('videoPlayer');
  if (!player.src) return;
  const parts = timeStr.split(":").map(Number);
  const secs = parts.length === 2 ? parts[0] * 60 + parts[1] : parts[0];
  player.currentTime = secs;
  player.play().catch(() => {});
  // Scroll vers le player
  document.getElementById('videoWrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setProgress(pct, txt) {
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progStatus').textContent = txt;
}
function showErr(msg) { const b = document.getElementById('errBox'); b.textContent = msg; b.classList.add('on'); }
function hideErr() { document.getElementById('errBox').classList.remove('on'); }

function resetAll() {
  file = null; fi.value = '';
  document.getElementById('fileInfo').textContent = '';
  zone.classList.remove('has');
  document.getElementById('videoWrap').classList.remove('on');
  document.getElementById('videoPlayer').src = '';
  if (videoObjectUrl) { URL.revokeObjectURL(videoObjectUrl); videoObjectUrl = null; }
  document.getElementById('results').classList.remove('on');
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('progWrap').classList.remove('on');
  hideErr();
}

// ── ANALYZE ──────────────────────────────────────────────────────────────────
async function analyze() {
  hideErr();
  const key  = document.getElementById('apiKey').value.trim();
  const hero = document.getElementById('heroSelect').value;
  const rank = document.getElementById('rankSelect').value;
  if (!key)  { showErr('Entre ta clé API Gemini.'); return; }
  if (!file) { showErr('Sélectionne une VOD.'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  document.getElementById('progWrap').classList.add('on');
  document.getElementById('results').classList.remove('on');
  document.getElementById('emptyState').style.display = 'none';

  try {
    setProgress(10, 'Envoi de la vidéo au serveur...');
    const form = new FormData();
    form.append('api_key', key);
    form.append('hero', hero);
    form.append('rank', rank);
    form.append('video', file);

    setProgress(20, 'Upload vers Gemini... (peut prendre quelques minutes)');

    // Simuler progression pendant l'attente
    let prog = 20;
    const progInterval = setInterval(() => {
      if (prog < 85) { prog += 1; setProgress(prog, 'Analyse IA en cours...'); }
    }, 4000);

    const res = await fetch(SERVER_URL + "/analyze", { method: 'POST', body: form });
    clearInterval(progInterval);

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Erreur serveur');

    setProgress(100, 'Analyse terminée !');
    setTimeout(() => document.getElementById('progWrap').classList.remove('on'), 1000);
    render(data);

  } catch(err) {
    showErr('Erreur : ' + err.message);
    document.getElementById('progWrap').classList.remove('on');
    document.getElementById('emptyState').style.display = 'flex';
  } finally { btn.disabled = false; }
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function catCls(c) {
  return {death:'cat-death',mistake:'cat-mistake',good:'cat-good',positioning:'cat-positioning',ulti:'cat-ulti'}[c] || 'cat-ulti';
}
function catLbl(c) {
  return {death:'💀 Mort',mistake:'⚠ Erreur',good:'✓ Bon moment',positioning:'📍 Position',ulti:'⚡ Ulti'}[c] || c;
}

function toggleTs(i) {
  const b = document.getElementById('tsb-' + i);
  const c = document.getElementById('tsc-' + i);
  const open = b.classList.toggle('open');
  c.textContent = open ? '▲' : '▼';
  // Highlight item actif
  document.querySelectorAll('.ts-item').forEach(el => el.classList.remove('active'));
  if (open) document.getElementById('tsi-' + i).classList.add('active');
}

function render(data) {
  document.getElementById('summaryText').textContent = data.summary || '';
  document.getElementById('emptyState').style.display = 'none';

  document.getElementById('tsList').innerHTML = (data.timestamps || []).map((ts, i) => `
    <div class="ts-item" id="tsi-${i}">
      <div class="ts-head" onclick="toggleTs(${i})">
        <div class="ts-time" onclick="event.stopPropagation();seekTo('${ts.time}')" title="Aller à ce moment dans la vidéo">${ts.time}</div>
        <div class="ts-cat ${catCls(ts.category)}">${catLbl(ts.category)}</div>
        <div class="ts-title">${ts.title}</div>
        <div class="ts-chev" id="tsc-${i}">▼</div>
      </div>
      <div class="ts-body" id="tsb-${i}">
        ${ts.description}
        ${ts.screenshot ? `<div class="ts-screenshot"><img src="${ts.screenshot}" alt="Screenshot ${ts.time}" loading="lazy" onclick="seekTo('${ts.time}')"></div>` : ''}
      </div>
    </div>`).join('');

  document.getElementById('prioList').innerHTML = (data.priorities || []).map((p, i) => `
    <div class="prio-item">
      <div class="prio-num">${i + 1}.</div>
      <div class="prio-text">${p}</div>
    </div>`).join('');

  document.getElementById('results').classList.add('on');
}
</script>
</body>
</html>
