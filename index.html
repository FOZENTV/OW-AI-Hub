<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OW VOD Analyzer — Neural Coach</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ─────────────────────────────────────────
       DESIGN TOKENS
    ───────────────────────────────────────── */
    :root {
      --bg:       #0a0c10;
      --bg2:      #0f1218;
      --bg3:      #161b24;
      --border:   #1e2530;
      --border2:  #2a3342;
      --accent:   #f5a623;
      --blue:     #4a9eff;
      --green:    #3ecf8e;
      --red:      #ff4d6d;
      --purple:   #a78bfa;
      --text:     #e8edf5;
      --text2:    #8b95a8;
      --text3:    #4a5568;
      --font-display: 'Rajdhani', sans-serif;
      --font-body:    'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ─────────────────────────────────────────
       LAYOUT
    ───────────────────────────────────────── */
    .app-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(to right, #fff, var(--text2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--text2);
      font-size: 1.1rem;
      font-weight: 300;
    }

    /* ─────────────────────────────────────────
       PANELS
    ───────────────────────────────────────── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .grid-setup {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-family: var(--font-display);
      text-transform: uppercase;
      font-size: 0.9rem;
      color: var(--text2);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    input, select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      padding: 12px 15px;
      color: #fff;
      border-radius: 6px;
      font-family: inherit;
      transition: all 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(245, 166, 35, 0.1);
    }

    /* ─────────────────────────────────────────
       UPLOAD AREA
    ───────────────────────────────────────── */
    .upload-box {
      border: 2px dashed var(--border2);
      border-radius: 10px;
      padding: 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
    }

    .upload-box:hover {
      border-color: var(--accent);
      background: rgba(245, 166, 35, 0.02);
    }

    .upload-box input {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 15px;
      display: block;
    }

    .file-name {
      margin-top: 15px;
      color: var(--accent);
      font-weight: 600;
      font-family: var(--font-display);
    }

    /* ─────────────────────────────────────────
       BUTTONS
    ───────────────────────────────────────── */
    .btn-primary {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #000;
      font-family: var(--font-display);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 1.1rem;
      padding: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
      margin-top: 20px;
    }

    .btn-primary:hover:not(:disabled) {
      background: #ffb84d;
      transform: translateY(-2px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(1);
    }

    /* ─────────────────────────────────────────
       LOADING STATE
    ───────────────────────────────────────── */
    #progressSection {
      display: none;
      text-align: center;
      padding: 40px;
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid #FFF;
      border-bottom-color: var(--accent);
      border-radius: 50%;
      display: inline-block;
      animation: rotation 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-step {
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
      color: var(--accent);
    }

    /* ─────────────────────────────────────────
       RESULTS
    ───────────────────────────────────────── */
    #resultsSection { display: none; }

    .summary-card {
      background: linear-gradient(135deg, var(--bg2), var(--bg3));
      border-left: 4px solid var(--accent);
      padding: 25px;
      border-radius: 8px;
      margin-bottom: 40px;
    }

    .summary-card h2 {
      font-family: var(--font-display);
      text-transform: uppercase;
      margin-bottom: 15px;
      color: var(--accent);
    }

    .ts-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .ts-head {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      cursor: pointer;
      gap: 15px;
    }

    .ts-head:hover { background: var(--bg3); }

    .ts-time {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--accent);
      background: rgba(245, 166, 35, 0.1);
      padding: 4px 10px;
      border-radius: 4px;
      min-width: 65px;
      text-align: center;
    }

    .ts-category {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      letter-spacing: 0.5px;
    }

    .cat-death      { background: rgba(255, 77, 109, 0.15); color: var(--red); }
    .cat-mistake    { background: rgba(245, 166, 35, 0.15); color: var(--accent); }
    .cat-positioning { background: rgba(74, 158, 255, 0.15); color: var(--blue); }
    .cat-ulti       { background: rgba(167, 139, 250, 0.15); color: var(--purple); }
    .cat-good       { background: rgba(62, 207, 142, 0.15); color: var(--green); }

    .ts-title { flex: 1; font-weight: 600; }
    .ts-chevron { color: var(--text3); font-size: 0.8rem; }

    .ts-body {
      display: none;
      padding: 0 20px 20px 80px;
      color: var(--text2);
      font-size: 0.95rem;
      border-top: 1px solid var(--border);
      margin-top: -1px;
      padding-top: 15px;
    }

    /* Priorities List */
    .priority-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .priority-item {
      background: var(--bg3);
      padding: 20px;
      border-radius: 8px;
      border: 1px solid var(--border2);
      position: relative;
    }

    .priority-num {
      position: absolute;
      top: -10px;
      right: 15px;
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 800;
      color: rgba(255,255,255,0.03);
    }
  </style>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>OW VOD <span style="color: var(--accent)">Neural</span> Analyzer</h1>
      <p class="subtitle">L'expertise d'un coach Top 500 par Intelligence Artificielle</p>
    </header>

    <div id="setupSection" class="card">
      <div class="grid-setup">
        <div>
          <label>API Key Gemini</label>
          <input type="password" id="apiKey" placeholder="Entrez votre clé API...">
        </div>
        <div>
          <label>Héros Joué</label>
          <select id="heroSelect">
            <option value="">Chargement...</option>
          </select>
        </div>
        <div>
          <label>Votre Rang (Elo)</label>
          <select id="rankSelect">
            <option>Bronze</option>
            <option>Argent</option>
            <option>Or</option>
            <option>Platine</option>
            <option>Diamant</option>
            <option>Master</option>
            <option>Grand Master</option>
            <option>Top 500</option>
          </select>
        </div>
      </div>

      <div class="upload-box">
        <input type="file" id="videoFile" accept="video/*">
        <span class="upload-icon">📁</span>
        <p>Glissez votre vidéo MP4 ici ou <strong>cliquez pour choisir</strong></p>
        <div id="fileName" class="file-name"></div>
      </div>

      <button id="analyzeBtn" class="btn-primary" disabled>Lancer l'analyse neural</button>
    </div>

    <div id="progressSection" class="card">
      <span class="loader"></span>
      <div class="loading-step" id="loadingStatus">Initialisation...</div>
      <div id="loadingSub" style="font-size: 0.85rem; color: var(--text3)">Le traitement vidéo peut prendre 1 à 2 minutes</div>
    </div>

    <div id="resultsSection">
      <div class="summary-card">
        <h2>Diagnostic du Coach</h2>
        <div id="summaryText"></div>
      </div>

      <h3 style="font-family: var(--font-display); text-transform: uppercase; margin-bottom: 20px;">Timeline des événements</h3>
      <div id="timestampList"></div>

      <h3 style="font-family: var(--font-display); text-transform: uppercase; margin: 40px 0 20px;">Priorités de progression</h3>
      <div id="priorityList" class="priority-list"></div>

      <button onclick="location.reload()" class="btn-primary" style="background: transparent; color: var(--text2); border: 1px solid var(--border2); margin-top: 50px;">Nouvelle Analyse</button>
    </div>
  </div>

  <script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const GEMINI_MODEL = "gemini-2.0-flash";
    const CATEGORIES = {
      death:      { label: "Mort", cssClass: "cat-death" },
      mistake:    { label: "Erreur", cssClass: "cat-mistake" },
      positioning: { label: "Placement", cssClass: "cat-positioning" },
      ulti:       { label: "Ultime", cssClass: "cat-ulti" },
      good:       { label: "Bien joué", cssClass: "cat-good" }
    };

    // --- State ---
    let selectedFile = null;

    // --- Initialization ---
    async function init() {
      try {
        const res = await fetch('/heroes');
        const heroes = await res.json();
        const select = document.getElementById('heroSelect');
        select.innerHTML = heroes.sort().map(h => `<option value="${h}">${h}</option>`).join('');
      } catch (e) {
        document.getElementById('heroSelect').innerHTML = `<option>Erreur de chargement</option>`;
      }
    }
    init();

    // --- Events ---
    document.getElementById('videoFile').onchange = (e) => {
      selectedFile = e.target.files[0];
      document.getElementById('fileName').textContent = selectedFile ? selectedFile.name : '';
      checkReady();
    };

    document.getElementById('apiKey').oninput = checkReady;
    document.getElementById('analyzeBtn').onclick = generateAnalysis;

    function checkReady() {
      const key = document.getElementById('apiKey').value;
      document.getElementById('analyzeBtn').disabled = !(key && selectedFile);
    }

    // ─────────────────────────────────────────
    //  PROMPT ENGINE (V4.0)
    // ─────────────────────────────────────────
    function buildPrompt(hero, rank) {
      return `Tu es l'unité tactique "ARCHITECTE OW", un coach Top 500 spécialisé dans l'analyse de VOD. 
Ton but est de déconstruire cette vidéo de gameplay pour le héros ${hero} au rang ${rank}.

CADRE D'ANALYSE PAR RANG :
- Si le rang est < Diamant : Focus sur la survie, le gaspillage de cooldowns et le positionnement basique.
- Si le rang est >= Diamant : Focus sur le timing d'engagement, le "Target Focus" et l'économie d'Ultimates.

PROTOCOLE D'AUDIT CHIRURGICAL :
1. ANALYSE HUD : Surveille les icônes de cooldown en bas à droite. Note chaque utilisation réactive (panique) vs proactive.
2. RESOURCE TRADE : L'échange de sorts était-il rentable ? (ex: utiliser un Suzu pour sauver un allié déjà mort = Erreur).
3. POSITIONING DELTA : Analyse l'utilisation des angles naturels (Natural Cover). Le joueur est-il trop en "Open Field" ?
4. KILL FEED AWARENESS : Le joueur réagit-il aux morts dans son équipe ou continue-t-il de "feed" ?

STRUCTURE DE RÉPONSE OBLIGATOIRE (JSON UNIQUEMENT) :
{
  "summary": "Diagnostic neural global de la performance et du win-rate conditionnel.",
  "timestamps": [
    {
      "time": "MM:SS",
      "category": "death|mistake|positioning|ulti|good",
      "title": "[NOM DU SORT/ACTION] - Verdict",
      "description": "Analyse technique précise : Pourquoi c'était mal, la conséquence sur le fight, et le correctif immédiat."
    }
  ],
  "priorities": [
    "ERREUR MAJEURE : Ce qui bloque le Rank Up.",
    "OPTIMISATION MÉCANIQUE : Conseil spécifique sur le kit de ${hero}.",
    "SITUATIONNEL : Comment gérer les counters vus dans la vidéo."
  ]
}

Sois froid, technique et utilise le jargon : LoS, Peel, Off-angle, Burst, Stagger, Dry Fight. Génère entre 8 et 12 moments clés.`;
    }

    // ─────────────────────────────────────────
    //  CORE LOGIC
    // ─────────────────────────────────────────
    async function generateAnalysis() {
      const key  = document.getElementById('apiKey').value;
      const hero = document.getElementById('heroSelect').value;
      const rank = document.getElementById('rankSelect').value;

      showProgress();
      updateStatus("Upload de la vidéo...");

      try {
        const genAI = new GoogleGenerativeAI(key);
        const model = genAI.getGenerativeModel({ model: GEMINI_MODEL });

        // Conversion en base64 pour le mode client-side (Note: limite de taille possible selon le modèle)
        const base64Data = await fileToBase64(selectedFile);
        
        updateStatus("Analyse des pixels par l'IA...");
        
        const result = await model.generateContent([
          { inlineData: { data: base64Data, mimeType: selectedFile.type } },
          { text: buildPrompt(hero, rank) }
